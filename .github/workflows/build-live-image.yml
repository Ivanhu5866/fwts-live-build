name: Build fwts-live Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 26.03.00)'
        required: true
      git_name:
        description: 'Git author name for release commit'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone build dependencies
        run: |
          git clone --depth 1 https://github.com/ivanhu5866/pc-amd64-gadget.git
          git clone --depth 1 -b ubuntu/noble https://github.com/ivanhu5866/fwts-livecd-rootfs.git

      - name: Set image name
        run: echo "IMAGE_NAME=fwts-live-${{ inputs.version }}-x86_64.img.xz" >> $GITHUB_ENV

      - name: Build gadget prime (snapcraft on runner)
        run: |
          sudo snap install snapcraft --classic
          cd pc-amd64-gadget
          snapcraft prime --destructive-mode

      - name: Build Docker image
        run: docker build -t fwts-live .

      - name: Extract livecd-rootfs deb from Docker
        run: docker run --rm -v "$GITHUB_WORKSPACE:/image" fwts-live

      - name: Install ubuntu-image and livecd-rootfs on runner
        run: |
          sudo snap install ubuntu-image --classic
          sudo apt-get update
          sudo apt install -y ./livecd-rootfs_*_amd64.deb

      - name: Run ubuntu-image classic on runner (produces pc.img)
        run: |
          sudo ubuntu-image classic -d -p ubuntu-cpc -s questing -i 850M \
            --extra-ppas firmware-testing-team/ppa-fwts-stable \
            "$GITHUB_WORKSPACE/pc-amd64-gadget/prime"
          sudo xz pc.img

      - name: Verify output
        run: test -f pc.img.xz || (echo "Build failed - pc.img.xz not found" && exit 1)

      - name: Rename output
        run: mv pc.img.xz "${{ env.IMAGE_NAME }}"

      - name: Update SHA256SUM.txt
        run: sha256sum "${{ env.IMAGE_NAME }}" >> SHA256SUM.txt

      - name: Commit and push SHA256SUM.txt
        run: |
          git config user.name "${{ inputs.git_name }}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SHA256SUM.txt
          git commit -s -m "${{ inputs.version }}-x86_64"
          git pull --rebase origin master
          git push origin master

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "V${{ inputs.version }}" > /dev/null 2>&1; then
            gh release upload "V${{ inputs.version }}" "${{ env.IMAGE_NAME }}"
          else
            gh release create "V${{ inputs.version }}" \
              --title "fwts-live V${{ inputs.version }}" \
              --notes "fwts-live image V${{ inputs.version }} (x86_64)" \
              "${{ env.IMAGE_NAME }}"
          fi
